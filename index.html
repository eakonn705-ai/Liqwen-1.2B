<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid LFM 2.5 Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #333;
            overflow: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; background: white; }
        .header {
            padding: 14px 16px;
            border-bottom: 1px solid #e8e8e8;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .header-title { font-weight: 500; font-size: 15px; }
        .header-info { font-size: 12px; opacity: 0.9; margin-top: 2px; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 4px;
        }
        .dot.loading { background: #ff9800; animation: blink 1s infinite; }
        .dot.ready { background: #4caf50; }
        .dot.error { background: #f44336; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        .msg-group { display: flex; }
        .msg-group.user { justify-content: flex-end; }
        .msg-bubble {
            max-width: 72%; padding: 10px 13px; border-radius: 12px;
            font-size: 14px; line-height: 1.5; word-wrap: break-word;
        }
        .msg-group.user .msg-bubble { background: #667eea; color: white; }
        .msg-group.bot .msg-bubble { background: #f0f0f0; color: #333; }
        .msg-bubble.thinking { font-style: italic; color: #888; background: #f5f5f5; }
        .input-section {
            padding: 12px 16px; border-top: 1px solid #e8e8e8;
            background: white; display: flex; gap: 8px;
        }
        input[type="text"] {
            flex: 1; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; font-family: inherit;
        }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        input[type="text"]:disabled { background: #f5f5f5; color: #999; }
        button {
            padding: 10px 16px; background: #667eea; color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 500;
        }
        button:hover:not(:disabled) { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error-banner {
            background: #ffebee; border-left: 3px solid #f44336;
            padding: 10px 12px; font-size: 12px; color: #c62828; border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-title">Liquid LFM 2.5 1.2B JP Chat</div>
        <div class="header-info">
            <span class="dot loading" id="dot"></span>
            <span id="statusText">初期化中...</span>
        </div>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-section">
        <input type="text" id="userInput" placeholder="メッセージを入力..." disabled>
        <button id="sendBtn" disabled>送信</button>
    </div>
</div>

<script type="module">
    import * as webllm from 'https://esm.run/@mlc-ai/web-llm';

    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const dot = document.getElementById('dot');

    let engine = null;
    let modelLoaded = false;
    let isGenerating = false;

    // --- LFM 2.5 230M 量子化モデル用の設定 ---
    const MODEL_ID = 'Liquid-LFM-2.5-230M-q4f16_1-MLC'; 
    const MODEL_URL = 'https://huggingface.co/webml-community/Liquid-LFM-2.5-230M-q4f16_1-MLC';

    function setStatus(status, text) {
        statusText.textContent = text;
        dot.className = 'dot ' + status;
    }

    function addMessage(role, content) {
        const group = document.createElement('div');
        group.className = 'msg-group ' + role;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = content;
        group.appendChild(bubble);
        chatContainer.appendChild(group);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return bubble;
    }

    async function initializeModel() {
        try {
            setStatus('loading', 'モデル初期化中...');

            // WebLLMにカスタム量子化モデルの配置場所を認識させる設定
            const appConfig = {
                model_list: [
                    {
                        model: MODEL_URL,
                        model_id: MODEL_ID,
                        model_lib: 'https://raw.githubusercontent.com/webml-community/webml-wams/main/lfm2/lfm2-webgpu.wasm'
                    }
                ]
            };

            // エンジンの初期化に appConfig を渡す
            engine = await webllm.CreateMLCEngine(MODEL_ID, {
                appConfig: appConfig,
                initProgressCallback: (info) => {
                    const percent = Math.round(info.progress * 100);
                    setStatus('loading', `ロード中: ${percent}%`);
                }
            });

            modelLoaded = true;
            setStatus('ready', '準備完了');
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            addMessage('bot', 'こんにちは👋 Liquid LFM 2.5 230M (量子化版) です。超軽量エッジAIの世界へようこそ！何かお手伝いできますか？');

        } catch (error) {
            setStatus('error', 'エラー');
            const errDiv = document.createElement('div');
            errDiv.className = 'error-banner';
            errDiv.textContent = '初期化エラー: ' + error.message;
            chatContainer.appendChild(errDiv);
            console.error(error);
        }
    }

    async function generateResponse(userMessage) {
        if (!modelLoaded || isGenerating) return;
        isGenerating = true;
        userInput.disabled = true;
        sendBtn.disabled = true;

        addMessage('user', userMessage);

        const thinkingGroup = document.createElement('div');
        thinkingGroup.className = 'msg-group bot';
        const thinkingBubble = document.createElement('div');
        thinkingBubble.className = 'msg-bubble thinking';
        thinkingBubble.textContent = 'AIが考え中...';
        thinkingGroup.appendChild(thinkingBubble);
        chatContainer.appendChild(thinkingGroup);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        const replyGroup = document.createElement('div');
        replyGroup.className = 'msg-group bot';
        const replyBubble = document.createElement('div');
        replyBubble.className = 'msg-bubble';
        replyGroup.appendChild(replyBubble);

        let fullResponse = '';
        let replaced = false;

        try {
            const chunks = await engine.generate(userMessage, (chunk) => {
                fullResponse += chunk;
                if (!replaced) {
                    chatContainer.removeChild(thinkingGroup);
                    chatContainer.appendChild(replyGroup);
                    replaced = true;
                }
                replyBubble.textContent = fullResponse;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        } catch (error) {
            if (chatContainer.contains(thinkingGroup)) chatContainer.removeChild(thinkingGroup);
            const errDiv = document.createElement('div');
            errDiv.className = 'error-banner';
            errDiv.textContent = '生成エラー: ' + error.message;
            chatContainer.appendChild(errDiv);
            console.error(error);
        } finally {
            isGenerating = false;
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function handleSend() {
        const message = userInput.value.trim();
        if (message && !isGenerating) {
            userInput.value = '';
            generateResponse(message);
        }
    }

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); handleSend(); }
    });
    sendBtn.addEventListener('click', handleSend);

    initializeModel();
</script>
</body>
</html>
