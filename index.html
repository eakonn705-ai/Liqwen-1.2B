<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Chat with Memory & Markdown</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        html, body {
            height: 100vh; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; display: flex; flex-direction: column; box-sizing: border-box;
        }

        /* ヘッダー */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background-color: #ffffff; border-bottom: 1px solid #ccc;
        }
        .header h2 { margin: 0; font-size: 1.2rem; }
        .header-buttons { display: flex; gap: 10px; }
        
        /* 共通ボタンレイアウト */
        button {
            padding: 10px 20px; color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px; transition: background-color 0.2s;
        }
        .btn-primary { background-color: #28a745; }
        .btn-primary:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #bd2130; }
        button:disabled { background-color: #a5d6a7; cursor: not-allowed; }

        /* メインコンテンツエリア */
        .main-container { display: flex; flex-grow: 1; overflow: hidden; }

        /* チャットエリア */
        .chat-container {
            flex-grow: 3; display: flex; flex-direction: column;
            background-color: #ffffff; border-right: 1px solid #ccc;
        }
        #chat-box {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* 記憶（Memory）サイドパネル */
        .memory-panel {
            flex-grow: 1; min-width: 250px; max-width: 350px;
            background-color: #f8f9fa; padding: 20px; overflow-y: auto; box-sizing: border-box;
        }
        .memory-panel h3 { margin-top: 0; font-size: 1.1rem; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        #memory-list { padding-left: 20px; font-size: 14px; color: #495057; line-height: 1.6; }

        /* 吹き出しの基本デザイン */
        .message {
            padding: 12px 16px; border-radius: 15px; max-width: 75%;
            line-height: 1.6; word-wrap: break-word;
        }
        .user-message {
            background-color: #007bff; color: white;
            align-self: flex-end; border-bottom-right-radius: 2px;
        }
        .ai-message {
            background-color: #e9ecef; color: #333;
            align-self: flex-start; border-bottom-left-radius: 2px;
        }

        /* --- Markdown 用のスタイル追加 --- */
        .message p { margin: 0 0 10px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 0 0 10px 20px; padding: 0; }
        
        /* インラインコード */
        .message code {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 2px 6px; border-radius: 4px;
            font-family: 'Courier New', Courier, monospace; font-size: 0.9em;
        }
        /* ユーザー側のインラインコードは見やすく調整 */
        .user-message code { background-color: rgba(255, 255, 255, 0.2); }
        
        /* コードブロック */
        .message pre {
            background-color: #2d2d2d; color: #f8f8f2;
            padding: 15px; border-radius: 8px; overflow-x: auto;
            margin: 10px 0;
        }
        .message pre code {
            background-color: transparent; padding: 0; color: inherit;
        }
        /* テーブル */
        .message table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
        .message th, .message td { border: 1px solid #ccc; padding: 6px 10px; }
        .user-message th, .user-message td { border-color: rgba(255,255,255,0.3); }

        /* 入力エリア */
        .input-area {
            display: flex; gap: 10px; padding: 15px 20px;
            background-color: #f4f4f9; border-top: 1px solid #ccc;
        }
        #user-input {
            flex-grow: 1; padding: 12px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Groq Chat (Model: GPTOSS120B)</h2>
        <div class="header-buttons">
            <button class="btn-danger" onclick="newChat()">新しいチャット</button>
            <button class="btn-secondary" onclick="downloadData()">履歴＆記憶を保存</button>
            <input type="file" id="file-upload" accept=".json" style="display: none;" onchange="uploadData(event)">
            <button class="btn-secondary" onclick="document.getElementById('file-upload').click()">データを復元</button>
        </div>
    </div>

    <div class="main-container">
        <div class="chat-container">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="メッセージを入力..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" class="btn-primary" onclick="sendMessage()">送信</button>
            </div>
        </div>

        <div class="memory-panel">
            <h3>現在の記憶 (Memory)</h3>
            <ul id="memory-list">
                <li>（記憶された情報はありません）</li>
            </ul>
        </div>
    </div>

    <script>
        // 【重要】ここにデプロイしたCloudflare WorkerのURLを入力してください
        const WORKER_URL = "https://curly-bird-8641.18-kota-shobun.workers.dev/";
        
        let conversationHistory = [];
        let memories = [];

        const DEFAULT_SYSTEM_PROMPT = { role: "system", content: "あなたは優秀なAIアシスタントです。回答はMarkdown記法を用いて、見やすく構造化してください。" };

        function initChat() {
            conversationHistory = [DEFAULT_SYSTEM_PROMPT];
            document.getElementById("chat-box").innerHTML = "";
            appendMessage("ai", "こんにちは！何かお手伝いできることはありますか？");
            updateMemoryUI();
        }

        function newChat() {
            if (confirm("現在のチャット履歴をクリアして新しい会話を始めますか？（※右側の「記憶(Memory)」は維持されます）")) {
                conversationHistory = [DEFAULT_SYSTEM_PROMPT];
                document.getElementById("chat-box").innerHTML = "";
                appendMessage("ai", "新しいチャットを開始しました。");
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const sendBtn = document.getElementById("send-btn");
            const message = inputField.value.trim();
            
            if (!message) return;

            appendMessage("user", message);
            inputField.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "送信中...";
            
            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        messages: conversationHistory,
                        memories: memories 
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    appendMessage("ai", `**エラーが発生しました:** ${data.error} \n\n詳細: ${data.details || ""}`);
                    conversationHistory.pop();
                } else {
                    let aiResponse = data.choices[0].message.content;
                    
                    // Memoryの抽出処理（生のテキストデータから抽出）
                    extractAndProcessMemories(aiResponse);

                    // 画面表示
                    appendMessage("ai", aiResponse);
                    conversationHistory.push({ role: "assistant", content: aiResponse });
                }
            } catch (error) {
                appendMessage("ai", "**通信エラーが発生しました。**");
                conversationHistory.pop();
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "送信";
                inputField.focus();
            }
        }

        function extractAndProcessMemories(text) {
            const regex = /<memory>([\s\S]*?)<\/memory>/g;
            let match;
            let updated = false;

            while ((match = regex.exec(text)) !== null) {
                const memoryContent = match[1].trim();
                if (memoryContent && !memories.includes(memoryContent)) {
                    memories.push(memoryContent);
                    updated = true;
                }
            }

            if (updated) {
                updateMemoryUI();
            }
        }

        function updateMemoryUI() {
            const listContainer = document.getElementById("memory-list");
            listContainer.innerHTML = "";
            
            if (memories.length === 0) {
                listContainer.innerHTML = "<li>（記憶された情報はありません）</li>";
                return;
            }

            memories.forEach(m => {
                const li = document.createElement("li");
                li.textContent = m;
                listContainer.appendChild(li);
            });
        }

        // --- Markdown対応のメッセージ描画処理 ---
        function appendMessage(role, text) {
            const chatBox = document.getElementById("chat-box");
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", role === "user" ? "user-message" : "ai-message");
            
            // marked.js を使用して Markdown を HTML に変換
            // xss対策を厳密にする場合はDOMPurifyなどを挟むのがベストですが、今回は簡易的に直接出力します
            messageDiv.innerHTML = marked.parse(text);
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function downloadData() {
            if (conversationHistory.length <= 1 && memories.length === 0) {
                alert("ダウンロードするデータがありません。");
                return;
            }
            const exportData = { history: conversationHistory, memories: memories };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "chat_session_with_memory.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function uploadData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    if (loadedData.history && loadedData.memories) {
                        conversationHistory = loadedData.history;
                        memories = loadedData.memories;
                        renderChatFromHistory();
                        updateMemoryUI();
                    } else {
                        alert("無効なデータ形式です。");
                    }
                } catch (error) {
                    alert("ファイルの読み込みに失敗しました。");
                }
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function renderChatFromHistory() {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = "";
            conversationHistory.forEach(msg => {
                if (msg.role !== "system") {
                    appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
                }
            });
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        initChat();
    </script>
</body>
</html>
