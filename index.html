<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASUKA.LM</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        html, body {
            height: 100vh; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; color: #333; box-sizing: border-box;
        }

        /* 共通ボタン */
        button {
            padding: 10px 20px; color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px; transition: background-color 0.2s;
        }
        .btn-primary { background-color: #28a745; }
        .btn-primary:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #bd2130; }
        button:disabled { background-color: #a5d6a7; cursor: not-allowed; }

        /* 画面表示切り替え */
        .view-section { display: none; height: 100vh; flex-direction: column; }
        .view-active { display: flex; }

        /* --- 1. トップページ（モデル選択＆新規作成） --- */
        .top-container {
            max-width: 1000px; margin: 0 auto; padding: 40px 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;
        }
        .top-container h1 { font-size: 2.5rem; margin-bottom: 10px; color: #007bff; }
        .top-container p { color: #666; margin-bottom: 30px; }
        
        /* モデル作成フォーム */
        .create-model-form {
            background: #ffffff; border: 1px solid #ccc; border-radius: 12px;
            padding: 20px; width: 100%; max-width: 600px; margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left;
        }
        .create-model-form h2 { margin-top: 0; font-size: 1.2rem; color: #333; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .form-group label { font-size: 13px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .form-group textarea { resize: vertical; height: 60px; }
        
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; width: 100%; max-width: 900px;
        }
        .model-card {
            background: #ffffff; border: 1px solid #e3e6f0; border-radius: 12px;
            padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; text-align: center;
        }
        .model-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border-color: #007bff; }
        .model-avatar {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            margin-bottom: 15px; background-color: #e9ecef; border: 3px solid #f8f9fa;
        }
        .model-card h3 { margin: 10px 0; font-size: 1.3rem; color: #222; }
        .model-card p { font-size: 14px; color: #6c757d; margin: 0; line-height: 1.4; }

        /* --- 2. チャットページ --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background-color: #ffffff; border-bottom: 1px solid #ccc;
        }
        .header-title-area { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .header h2 { margin: 0; font-size: 1.2rem; }
        .header-buttons { display: flex; gap: 10px; }
        
        .main-container { display: flex; flex-grow: 1; overflow: hidden; }
        .chat-container { flex-grow: 3; display: flex; flex-direction: column; background-color: #ffffff; border-right: 1px solid #ccc; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* 3層管理サイドパネル */
        .memory-panel {
            flex-grow: 1; min-width: 280px; max-width: 380px;
            background-color: #f8f9fa; padding: 20px; overflow-y: auto; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 25px;
        }
        .memory-section h3 { margin-top: 0; font-size: 1.05rem; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 5px; margin-bottom: 10px; }
        #persona-display { font-size: 14px; color: #495057; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #e3e6f0; line-height: 1.5; min-height: 40px; }
        .data-list { padding-left: 20px; font-size: 14px; color: #495057; line-height: 1.6; margin: 0; }

        /* 吹き出し */
        .message { padding: 12px 16px; border-radius: 15px; max-width: 75%; line-height: 1.6; word-wrap: break-word; }
        .user-message { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background-color: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Markdown スタイル */
        .message p { margin: 0 0 10px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 0 0 10px 20px; padding: 0; }
        .message code { background-color: rgba(0, 0, 0, 0.08); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .user-message code { background-color: rgba(255, 255, 255, 0.2); }
        .message pre { background-color: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
        .message pre code { background-color: transparent; padding: 0; color: inherit; }
        .message table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
        .message th, .message td { border: 1px solid #ccc; padding: 6px 10px; }

        /* 入力エリア */
        .input-area { display: flex; gap: 10px; padding: 15px 20px; background-color: #f4f4f9; border-top: 1px solid #ccc; }
        #user-input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="top-view" class="view-section view-active">
        <div class="top-container">
            <h1>AI Chat Station</h1>
            <p>対話するAIモデルを選択するか、新しいカスタムモデルを作成してください</p>
            
            <div class="create-model-form">
                <h2>＋ 新しいカスタムモデルを追加 (画面上の一時追加)</h2>
                <div class="form-group">
                    <label for="new-model-id">モデルID / API識別子 (例: meta/llama-3-70b)</label>
                    <input type="text" id="new-model-id" placeholder="provider/model-name">
                </div>
                <div class="form-group">
                    <label for="new-model-name">表示名 (例: Llama3 70B カスタム)</label>
                    <input type="text" id="new-model-name" placeholder="自由な名前を入力">
                </div>
                <div class="form-group">
                    <label for="new-model-desc">説明文</label>
                    <textarea id="new-model-desc" placeholder="このモデルの特徴や用途を入力"></textarea>
                </div>
                <button class="btn-primary" onclick="createNewModel()">モデルを追加する</button>
            </div>

            <div id="model-grid" class="grid-container">
                </div>
        </div>
    </div>


    <div id="chat-view" class="view-section">
        <div class="header">
            <div class="header-title-area">
                <img id="current-avatar" class="header-avatar" src="" alt="Avatar">
                <h2 id="current-model-title">Groq Chat</h2>
            </div>
            <div class="header-buttons">
                <button class="btn-secondary" onclick="backToTop()">モデルを変更</button>
                <button class="btn-danger" onclick="newChat()">クリア</button>
                <button class="btn-secondary" onclick="downloadData()">保存</button>
                <input type="file" id="file-upload" accept=".json" style="display: none;" onchange="uploadData(event)">
                <button class="btn-secondary" onclick="document.getElementById('file-upload').click()">復元</button>
            </div>
        </div>

        <div class="main-container">
            <div class="chat-container">
                <div id="chat-box"></div>
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="メッセージを入力..." onkeypress="handleKeyPress(event)">
                    <button id="send-btn" class="btn-primary" onclick="sendMessage()">送信</button>
                </div>
            </div>

            <div class="memory-panel">
                <div class="memory-section">
                    <h3>1. 現在の人格 (Persona)</h3>
                    <div id="persona-display">デフォルト設定</div>
                </div>
                <div class="memory-section">
                    <h3>2. 現在の記憶 (Memory)</h3>
                    <ul id="memory-list" class="data-list">
                        <li>（記憶された事実はありません）</li>
                    </ul>
                </div>
                <div class="memory-section">
                    <h3>3. 現在の戦略・教訓 (Strategy)</h3>
                    <ul id="strategy-list" class="data-list">
                        <li>（蓄積された戦略はありません）</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // 【重要】設定項目
        // ================================================================
        const WORKER_URL = "https://curly-bird-8641.18-kota-shobun.workers.dev/";
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz0uCNsOOpu3Fo117e-dWbxFw2SQAu0wFQ0zlJSAltAYMnqqAbuNUlA4hoNTT2LU8TMyA/exec";
        // ================================================================

        let selectedModelId = ""; 
        let conversationHistory = [];
        let persona = "";
        let memories = [];
        let strategies = [];
        
        // GASから読み込んだ、または手動追加したモデル一覧を保持する配列
        let loadedModelsList = [];

        const DEFAULT_SYSTEM_PROMPT = { role: "system", content: "あなたは優秀なAIアシスタントです。回答はMarkdown記法を用いて見やすく構造化してください。" };

        // 起動時に【GAS】からモデル一覧を自動ロード
        async function loadModels() {
            try {
                const response = await fetch(GAS_API_URL);
                if (response.ok) {
                    loadedModelsList = await response.json();
                } else {
                    console.error("GAS APIからの応答が不正です。");
                }
            } catch (error) {
                console.error("GASからのモデルデータ取得に失敗しました。URLやデプロイ設定を確認してください。");
            }
            // 取得成否に関わらず、描画処理を実行（手動追加機能を生かすため）
            renderModelGrid();
        }

        // 画面にモデルカード一覧を出力する共通処理
        function renderModelGrid() {
            const grid = document.getElementById('model-grid');
            grid.innerHTML = "";

            if (loadedModelsList.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; color: #cc0000; font-weight: bold;'>GASからモデルを読み込めませんでした。URLを設定するか、上のフォームから一時的なカスタムモデルを追加してください。</p>";
                return;
            }

            loadedModelsList.forEach(model => {
                const safeBaseName = model.id.replace(/\//g, '-');
                
                // スプシ側に直URLがあればそれを使い、空欄なら同階層の「ファイル名.png / .json」を動的参照
                const imageUrl = model.imageUrl ? model.imageUrl : `${safeBaseName}.png`;
                const modelJsonUrl = model.configJsonUrl ? model.configJsonUrl : `${safeBaseName}.json`;

                const card = document.createElement('div');
                card.className = 'model-card';
                card.onclick = () => selectModel(model.id, model.name, imageUrl, modelJsonUrl);

                card.innerHTML = `
                    <img class="model-avatar" src="${imageUrl}" onerror="this.src='https://via.placeholder.com/100?text=${encodeURIComponent(model.name)}'" alt="${model.name}">
                    <h3>${model.name}</h3>
                    <p>${model.description || '説明なし'}</p>
                `;
                grid.appendChild(card);
            });
        }

        // 画面上で新しいモデルを一時的に作成・追加するUIロジック
        function createNewModel() {
            const idField = document.getElementById('new-model-id');
            const nameField = document.getElementById('new-model-name');
            const descField = document.getElementById('new-model-desc');

            const id = idField.value.trim();
            const name = nameField.value.trim();
            const description = descField.value.trim();

            if (!id || !name) {
                alert("モデルIDと表示名は必須入力項目です。");
                return;
            }

            if (loadedModelsList.some(m => m.id === id)) {
                alert("そのモデルIDは既にリストに存在します。");
                return;
            }

            // 配列の先頭に追加 (スプシから取得したデータにマージされる)
            loadedModelsList.unshift({ id, name, description, imageUrl: "", configJsonUrl: "" });

            idField.value = "";
            nameField.value = "";
            descField.value = "";

            renderModelGrid();
            alert(`新モデル「${name}」を追加しました！カードをクリックして開始できます。`);
        }

        // モデル選択時のアクションと個別JSONファイルへの自動フック
        async function selectModel(modelId, modelName, imageUrl, modelJsonUrl) {
            selectedModelId = modelId;
            document.getElementById('current-model-title').textContent = `${modelName} (${modelId})`;
            document.getElementById('current-avatar').src = imageUrl;

            // 個別設定用の「モデル名.json」へのフック処理
            try {
                const res = await fetch(modelJsonUrl);
                if (res.ok) {
                    const modelConfig = await res.json();
                    console.log("個別モデルのJSON情報を読み込みました:", modelConfig);
                }
            } catch (e) {
                console.log("個別モデルJSONへのフックはスキップされました（未配置など）。");
            }

            initChat();

            // 画面切り替え
            document.getElementById('top-view').classList.remove('view-active');
            document.getElementById('chat-view').classList.add('view-active');
        }

        function backToTop() {
            if (confirm("トップに戻りますか？会話履歴はクリアされます（記憶や戦略は残ります）。")) {
                document.getElementById('chat-view').classList.remove('view-active');
                document.getElementById('top-view').classList.add('view-active');
            }
        }

        function initChat() {
            conversationHistory = [DEFAULT_SYSTEM_PROMPT];
            document.getElementById("chat-box").innerHTML = "";
            appendMessage("ai", `接続が完了しました。何かお手伝いできることはありますか？`);
            updateMemoryUI();
        }

        function newChat() {
            if (confirm("現在の会話履歴をクリアしますか？（※右側の記憶コンテキストは保持されます）")) {
                initChat();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const sendBtn = document.getElementById("send-btn");
            const message = inputField.value.trim();
            
            if (!message) return;

            appendMessage("user", message);
            inputField.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "送信中...";
            
            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        messages: conversationHistory,
                        persona: persona,
                        memories: memories,
                        strategies: strategies,
                        model: selectedModelId 
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    appendMessage("ai", `**エラーが発生しました:** ${data.error}`);
                    conversationHistory.pop();
                } else {
                    let aiResponse = data.choices[0].message.content;
                    
                    extractAndProcessData(aiResponse);

                    // タグ構造のクリーンアップ消去
                    let cleanedResponse = aiResponse
                        .replace(/<persona>[\s\S]*?<\/persona>/gi, '')
                        .replace(/<memory>[\s\S]*?<\/memory>/gi, '')
                        .replace(/<strategy>[\s\S]*?<\/strategy>/gi, '')
                        .trim();

                    if (cleanedResponse === "") {
                        cleanedResponse = "（コンテキストを更新しました）";
                    }

                    appendMessage("ai", cleanedResponse);
                    conversationHistory.push({ role: "assistant", content: cleanedResponse });
                }
            } catch (error) {
                appendMessage("ai", "**通信エラーが発生しました。**");
                conversationHistory.pop();
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "送信";
                inputField.focus();
            }
        }

        function extractAndProcessData(text) {
            const ignorePattern = /^(特になし|なし|変更なし|なし。|特になし。|none|null|undefined|\s*)$/i;

            // 1. Persona
            const personaRegex = /<persona>([\s\S]*?)<\/persona>/g;
            let personaMatch;
            while ((personaMatch = personaRegex.exec(text)) !== null) {
                const content = personaMatch[1].trim();
                if (content && !ignorePattern.test(content)) persona = content;
            }

            // 2. Memory
            const memoryRegex = /<memory>([\s\S]*?)<\/memory>/g;
            let memoryMatch;
            while ((memoryMatch = memoryRegex.exec(text)) !== null) {
                const content = memoryMatch[1].trim();
                if (content && !ignorePattern.test(content)) {
                    if (!memories.includes(content)) memories.push(content);
                }
            }

            // 3. Strategy
            const strategyRegex = /<strategy>([\s\S]*?)<\/strategy>/g;
            let strategyMatch;
            while ((strategyMatch = strategyRegex.exec(text)) !== null) {
                const content = strategyMatch[1].trim();
                if (content && !ignorePattern.test(content)) {
                    if (!strategies.includes(content)) strategies.push(content);
                }
            }

            updateMemoryUI();
        }

        function updateMemoryUI() {
            document.getElementById("persona-display").textContent = persona ? persona : "デフォルト設定";
            document.getElementById("memory-list").innerHTML = memories.length === 0 ? "<li>（なし）</li>" : memories.map(m => `<li>${m}</li>`).join("");
            document.getElementById("strategy-list").innerHTML = strategies.length === 0 ? "<li>（なし）</li>" : strategies.map(s => `<li>${s}</li>`).join("");
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById("chat-box");
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", role === "user" ? "user-message" : "ai-message");
            messageDiv.innerHTML = marked.parse(text);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function downloadData() {
            const exportData = { 
                modelId: selectedModelId,
                history: conversationHistory, 
                persona: persona,
                memories: memories,
                strategies: strategies 
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `chat_session_${selectedModelId.replace(/\//g, '-')}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function uploadData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    if (loadedData.history) {
                        conversationHistory = loadedData.history;
                        persona = loadedData.persona || "";
                        memories = loadedData.memories || [];
                        strategies = loadedData.strategies || [];
                        if (loadedData.modelId) selectedModelId = loadedData.modelId;
                        
                        renderChatFromHistory();
                        updateMemoryUI();
                    } else {
                        alert("データ形式が正しくありません。");
                    }
                } catch (error) {
                    alert("ファイルの読み込みに失敗しました。");
                }
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function renderChatFromHistory() {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = "";
            conversationHistory.forEach(msg => {
                if (msg.role !== "system") {
                    appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
                }
            });
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }

        // 起動時に自動実行
        loadModels();
    </script>
</body>
</html>
