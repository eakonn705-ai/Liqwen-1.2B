<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        #chat-box { height: 400px; background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 15px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user-message { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background-color: #e9ecef; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; gap: 10px; }
        #user-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #a5d6a7; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>Groq Chat (Model: GPTOSS120B)</h2>
    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">送信</button>
    </div>

    <script>
        // 【重要】ここにデプロイしたCloudflare WorkerのURLを入力してください
        const WORKER_URL = "https://curly-bird-8641.18-kota-shobun.workers.dev/";
        
        // 会話の文脈を保持するための配列
        let conversationHistory = [
            { role: "system", content: "あなたは優秀なAIアシスタントです。日本語で簡潔に答えてください。" }
        ];

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const sendBtn = document.getElementById("send-btn");
            const message = inputField.value.trim();
            
            if (!message) return;

            // ユーザーのメッセージを画面に表示
            appendMessage("user", message);
            inputField.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "送信中...";
            
            // 履歴に追加
            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                
                if (data.error) {
                    appendMessage("ai", `エラーが発生しました: ${data.error} \n詳細: ${data.details || ""}`);
                    conversationHistory.pop(); // エラー時は履歴からユーザー入力を消す
                } else {
                    const aiResponse = data.choices[0].message.content;
                    appendMessage("ai", aiResponse);
                    // AIの返答を履歴に追加
                    conversationHistory.push({ role: "assistant", content: aiResponse });
                }

            } catch (error) {
                appendMessage("ai", "通信エラーが発生しました。WorkerのURLが正しいか確認してください。");
                conversationHistory.pop();
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "送信";
                inputField.focus();
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById("chat-box");
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", role === "user" ? "user-message" : "ai-message");
            messageDiv.textContent = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
