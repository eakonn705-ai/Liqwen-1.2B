<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Chat with Triple Memory</title>
    
    <!-- marked.js の読み込み (Markdown対応) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        html, body {
            height: 100vh; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; display: flex; flex-direction: column; box-sizing: border-box;
        }

        /* ヘッダー */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background-color: #ffffff; border-bottom: 1px solid #ccc;
        }
        .header h2 { margin: 0; font-size: 1.2rem; }
        .header-buttons { display: flex; gap: 10px; }
        
        /* ボタン */
        button {
            padding: 10px 20px; color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px; transition: background-color 0.2s;
        }
        .btn-primary { background-color: #28a745; }
        .btn-primary:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #bd2130; }
        button:disabled { background-color: #a5d6a7; cursor: not-allowed; }

        /* メインコンテナ */
        .main-container { display: flex; flex-grow: 1; overflow: hidden; }

        /* チャットエリア */
        .chat-container {
            flex-grow: 3; display: flex; flex-direction: column;
            background-color: #ffffff; border-right: 1px solid #ccc;
        }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* 三層管理サイドパネル */
        .memory-panel {
            flex-grow: 1; min-width: 280px; max-width: 380px;
            background-color: #f8f9fa; padding: 20px; overflow-y: auto; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 25px;
        }
        .memory-section h3 { margin-top: 0; font-size: 1.05rem; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 5px; margin-bottom: 10px; }
        
        #persona-display { font-size: 14px; color: #495057; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #e3e6f0; line-height: 1.5; min-height: 40px; }
        .data-list { padding-left: 20px; font-size: 14px; color: #495057; line-height: 1.6; margin: 0; }

        /* 吹き出し */
        .message { padding: 12px 16px; border-radius: 15px; max-width: 75%; line-height: 1.6; word-wrap: break-word; }
        .user-message { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background-color: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Markdown スタイル */
        .message p { margin: 0 0 10px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 0 0 10px 20px; padding: 0; }
        .message code { background-color: rgba(0, 0, 0, 0.08); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .user-message code { background-color: rgba(255, 255, 255, 0.2); }
        .message pre { background-color: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
        .message pre code { background-color: transparent; padding: 0; color: inherit; }
        .message table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
        .message th, .message td { border: 1px solid #ccc; padding: 6px 10px; }

        /* 入力エリア */
        .input-area { display: flex; gap: 10px; padding: 15px 20px; background-color: #f4f4f9; border-top: 1px solid #ccc; }
        #user-input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Groq Chat (openai/gpt-oss-120b)</h2>
        <div class="header-buttons">
            <button class="btn-danger" onclick="newChat()">新しいチャット</button>
            <button class="btn-secondary" onclick="downloadData()">履歴＆記憶を保存</button>
            <input type="file" id="file-upload" accept=".json" style="display: none;" onchange="uploadData(event)">
            <button class="btn-secondary" onclick="document.getElementById('file-upload').click()">データを復元</button>
        </div>
    </div>

    <div class="main-container">
        <!-- チャット画面 -->
        <div class="chat-container">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="メッセージを入力..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" class="btn-primary" onclick="sendMessage()">送信</button>
            </div>
        </div>

        <!-- 3層管理パネル -->
        <div class="memory-panel">
            <!-- 1. Persona -->
            <div class="memory-section">
                <h3>1. 現在の人格 (Persona)</h3>
                <div id="persona-display">デフォルト設定（優秀なAIアシスタント）</div>
            </div>
            
            <!-- 2. Memory -->
            <div class="memory-section">
                <h3>2. 現在の記憶 (Memory)</h3>
                <ul id="memory-list" class="data-list">
                    <li>（記憶された事実はありません）</li>
                </ul>
            </div>

            <!-- 3. Strategy -->
            <div class="memory-section">
                <h3>3. 現在の戦略・教訓 (Strategy)</h3>
                <ul id="strategy-list" class="data-list">
                    <li>（蓄積された戦略はありません）</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 【重要】ここにデプロイしたCloudflare WorkerのURLを入力してください
        const WORKER_URL = "https://your-worker-name.your-subdomain.workers.dev";
        
        let conversationHistory = [];
        let persona = "";
        let memories = [];
        let strategies = []; // 追加：AIのコツ・教訓

        const DEFAULT_SYSTEM_PROMPT = { role: "system", content: "あなたは優秀なAIアシスタントです。回答はMarkdown記法を用いて見やすく構造化してください。" };

        function initChat() {
            conversationHistory = [DEFAULT_SYSTEM_PROMPT];
            document.getElementById("chat-box").innerHTML = "";
            appendMessage("ai", "こんにちは！何かお手伝いできることはありますか？");
            updateMemoryUI();
        }

        function newChat() {
            if (confirm("現在のチャット履歴をクリアして新しい会話を始めますか？（※右側の「人格」「記憶」「戦略」はすべて維持されます）")) {
                conversationHistory = [DEFAULT_SYSTEM_PROMPT];
                document.getElementById("chat-box").innerHTML = "";
                appendMessage("ai", "新しいチャットを開始しました。これまでのコンテキストを引き継いで会話できます。");
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const sendBtn = document.getElementById("send-btn");
            const message = inputField.value.trim();
            
            if (!message) return;

            appendMessage("user", message);
            inputField.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "送信中...";
            
            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        messages: conversationHistory,
                        persona: persona,
                        memories: memories,
                        strategies: strategies // パラメータ送信
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    appendMessage("ai", `**エラーが発生しました:** ${data.error} \n\n詳細: ${data.details || ""}`);
                    conversationHistory.pop();
                } else {
                    let aiResponse = data.choices[0].message.content;
                    
                    // レスポンスから全3種類のタグを抽出・パース
                    extractAndProcessData(aiResponse);

                    // --- 3つ全てのタグ（中身を含む）をUIおよび履歴から完全に消去 ---
                    let cleanedResponse = aiResponse
                        .replace(/<persona>[\s\S]*?<\/persona>/gi, '')
                        .replace(/<memory>[\s\S]*?<\/memory>/gi, '')
                        .replace(/<strategy>[\s\S]*?<\/strategy>/gi, '') // 新規追加
                        .trim();

                    if (cleanedResponse === "") {
                        cleanedResponse = "（設定を更新しました）";
                    }

                    appendMessage("ai", cleanedResponse);
                    conversationHistory.push({ role: "assistant", content: cleanedResponse });
                }
            } catch (error) {
                appendMessage("ai", "**通信エラーが発生しました。**");
                conversationHistory.pop();
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "送信";
                inputField.focus();
            }
        }

        // --- 3種類のタグ抽出と不適切ワードフィルタリング ---
        function extractAndProcessData(text) {
            const ignorePattern = /^(特になし|なし|変更なし|なし。|特になし。|none|null|undefined|\s*)$/i;

            // 1. Persona
            const personaRegex = /<persona>([\s\S]*?)<\/persona>/g;
            let personaMatch;
            while ((personaMatch = personaRegex.exec(text)) !== null) {
                const content = personaMatch[1].trim();
                if (content && !ignorePattern.test(content)) {
                    persona = content;
                }
            }

            // 2. Memory
            const memoryRegex = /<memory>([\s\S]*?)<\/memory>/g;
            let memoryMatch;
            while ((memoryMatch = memoryRegex.exec(text)) !== null) {
                const content = memoryMatch[1].trim();
                if (content && !ignorePattern.test(content)) {
                    if (!memories.includes(content)) {
                        memories.push(content);
                    }
                }
            }

            // 3. Strategy
            const strategyRegex = /<strategy>([\s\S]*?)<\/strategy>/g;
            let strategyMatch;
            while ((strategyMatch = strategyRegex.exec(text)) !== null) {
                const content = strategyMatch[1].trim();
                if (content && !ignorePattern.test(content)) {
                    if (!strategies.includes(content)) {
                        strategies.push(content);
                    }
                }
            }

            updateMemoryUI();
        }

        // --- 全UI（3セクション）の再描画 ---
        function updateMemoryUI() {
            // 人格
            const personaDisplay = document.getElementById("persona-display");
            personaDisplay.textContent = persona ? persona : "デフォルト設定（優秀なAIアシスタント）";

            // 記憶
            const memoryContainer = document.getElementById("memory-list");
            memoryContainer.innerHTML = memories.length === 0 
                ? "<li>（記憶された事実はありません）</li>" 
                : memories.map(m => `<li>${m}</li>`).join("");

            // 戦略
            const strategyContainer = document.getElementById("strategy-list");
            strategyContainer.innerHTML = strategies.length === 0 
                ? "<li>（蓄積された戦略はありません）</li>" 
                : strategies.map(s => `<li>${s}</li>`).join("");
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById("chat-box");
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", role === "user" ? "user-message" : "ai-message");
            messageDiv.innerHTML = marked.parse(text);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- データのダウロード（4つの状態を一体化） ---
        function downloadData() {
            if (conversationHistory.length <= 1 && !persona && memories.length === 0 && strategies.length === 0) {
                alert("ダウンロードするデータがありません。");
                return;
            }
            const exportData = { 
                history: conversationHistory, 
                persona: persona,
                memories: memories,
                strategies: strategies // パッケージ化
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "chat_session_complete.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // --- データのアップロード（一括解凍） ---
        function uploadData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    if (loadedData.history) {
                        conversationHistory = loadedData.history;
                        persona = loadedData.persona || "";
                        memories = loadedData.memories || [];
                        strategies = loadedData.strategies || []; // 解凍
                        
                        renderChatFromHistory();
                        updateMemoryUI();
                    } else {
                        alert("無効なデータ形式です。");
                    }
                } catch (error) {
                    alert("ファイルの読み込みに失敗しました。");
                }
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function renderChatFromHistory() {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = "";
            conversationHistory.forEach(msg => {
                if (msg.role !== "system") {
                    appendMessage(msg.role === "user" ? "user" : "ai", msg.content);
                }
            });
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        initChat();
    </script>
</body>
</html>
